services:
  db:
    image: mysql:8.0
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE:      ${DB_DATABASE:-tudoleve}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_USER:          ${DB_USERNAME:-tudoleve}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-secret}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      # CMD-SHELL runs through /bin/sh inside the container; $$VAR escapes
      # Compose interpolation so the container shell reads $MYSQL_ROOT_PASSWORD.
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST:     db
      DB_PORT:     3306
      DB_USERNAME: ${DB_USERNAME:-tudoleve}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST:  redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache_data:/var/www/html/bootstrap/cache
    restart: unless-stopped

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      DB_HOST:     db
      DB_PORT:     3306
      DB_USERNAME: ${DB_USERNAME:-tudoleve}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST:  redis
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=60", "--sleep=3"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache_data:/var/www/html/bootstrap/cache
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - storage_data:/var/www/html/storage:ro
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ../tudoleve-frontend
      dockerfile: Dockerfile
    environment:
      # Exposed to the browser — must be a URL the end-user's browser can reach.
      # Local: http://localhost/api/v1  |  Production: https://api.yourdomain.com/api/v1
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost/api/v1}
      # Server-side only (SSR inside Docker). Uses the internal Docker network.
      # Never reaches the browser; falls back to NUXT_PUBLIC_API_BASE when unset.
      NUXT_API_BASE: ${NUXT_API_BASE:-http://nginx/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - nginx

volumes:
  db_data:
  redis_data:
  storage_data:
  bootstrap_cache_data:
