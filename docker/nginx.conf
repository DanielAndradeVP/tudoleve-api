server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Storage files served directly from the named volume —
    # eliminates the need for `php artisan storage:link` in this stack.
    location ^~ /storage/ {
        alias /var/www/html/storage/app/public/;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # API & Sanctum — all HTTP methods, including OPTIONS preflight, must
    # reach PHP-FPM so Laravel's HandleCors middleware can respond.
    # This location is evaluated before the static-assets regex below,
    # preventing any file-extension match from swallowing an API request.
    location ~* ^/(api|sanctum)/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Long-lived cache for versioned public assets (CSS, JS, images, fonts).
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|woff|woff2|ttf|svg|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass  backend:9000;
        fastcgi_index index.php;

        # $document_root is the literal value of the root directive above.
        # Both nginx and the backend container share /var/www/html/public
        # as the document root, so the path is valid on both sides.
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include       fastcgi_params;

        fastcgi_read_timeout          120;
        fastcgi_buffer_size           16k;
        fastcgi_buffers               4 16k;
        fastcgi_hide_header           X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
